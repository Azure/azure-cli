      {\n      \"type\": \"string\",\n      \"defaultValue\": \"northeurope\"\n    }\n
      \ },\n  \"variables\": {\n      \"policyDefinitionName\": \"policy-for-what-if-test\"\n
      \ },\n  \"resources\": [\n    {\n      \"name\": \"[variables('policyDefinitionName')]\",\n
